[build-system]
requires = ["setuptools==83.0.0"]
build-backend = "setuptools.build_meta"

[project]
name = "lvfi-pricing-engine"
version = "0.11.0"
description = "Núcleo matemático isolado do Linha de Valor Football Intelligence."
readme = "README.md"
requires-python = ">=3.13,<3.14"
authors = [{ name = "R21 Labs" }]
dependencies = []

[tool.setuptools.packages.find]
where = ["src"]
include = ["lvfi_pricing*"]
namespaces = false

[tool.setuptools.package-data]
lvfi_pricing = ["py.typed"]

[tool.pytest.ini_options]
minversion = "9.0"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "--strict-config",
    "--strict-markers",
    "-p",
    "no:cacheprovider",
    "-ra",
    "--cov=lvfi_pricing",
    "--cov-branch",
    "--cov-report=term-missing",
    "--cov-fail-under=100",
]

[tool.coverage.run]
branch = true
source = ["lvfi_pricing"]
omit = ["tests/*"]

[tool.coverage.report]
show_missing = true
fail_under = 100

[tool.ruff]
target-version = "py313"
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.ruff.lint.isort]
known-first-party = ["lvfi_pricing"]

[tool.mypy]
python_version = "3.13"
strict = true
files = ["src", "tests"]
mypy_path = "src"
namespace_packages = true
explicit_package_bases = true
warn_unused_configs = true

[tool.hypothesis]
deadline = 1000
